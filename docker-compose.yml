services:
  trade-fish:
    build: .
    container_name: trade-fish
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - trade_fish_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/pipeline/state"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  trade-fish-ollama:
    build: .
    container_name: trade-fish-ollama
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - trade_fish_data:/data
    depends_on:
      - ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  trade_fish_data:
  ollama_data:
